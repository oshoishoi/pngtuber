<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNGTuber Engine - Step 7 (Fixed Audio)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; overflow: hidden; display: flex; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        #preview-container { 
            flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background-color: #1a1a1a;
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), linear-gradient(-45deg, #222 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #222 75%), linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px; transition: all 0.3s ease; cursor: grab;
        }
        #preview-container:active { cursor: grabbing; }
        canvas { max-width: 100%; max-height: 100%; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        .sidebar { width: 340px; background: #1e1e1e; border-left: 1px solid #333; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; z-index: 20; transition: transform 0.3s ease, margin-right 0.3s ease; }
        .sidebar.hidden-panel { transform: translateX(100%); margin-right: -340px; }
        .mic-meter-container { height: 8px; background: #333; border-radius: 4px; overflow: hidden; position: relative; }
        #mic-meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #10b981); transition: width 0.05s ease-out; }
        .threshold-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 5; }
        .file-input-label { @apply flex flex-col items-center justify-center border-2 border-dashed border-gray-600 rounded-lg p-2 cursor-pointer hover:border-blue-500 transition text-[10px] text-gray-400; }
        .file-input-label.has-image { @apply border-blue-500 text-blue-400 bg-blue-900/10; }
        #ui-toggle-btn { position: absolute; top: 20px; right: 20px; z-index: 30; background: rgba(30, 30, 30, 0.8); border: 1px solid #444; color: #fff; padding: 8px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(4px); opacity: 0.3; }
        #ui-toggle-btn:hover { opacity: 1; background: #3b82f6; }
        .set-tab { @apply flex-1 py-2 text-xs font-bold rounded-lg transition-all; }
        .set-tab.active { @apply bg-blue-600 text-white shadow-inner; }
        .set-tab.inactive { @apply bg-gray-800 text-gray-500 hover:bg-gray-700; }
    </style>
</head>
<body>

    <div id="preview-container">
        <button id="ui-toggle-btn" title="UI Toggle (H / Esc)">⚙️</button>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="sidebar" class="sidebar">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-white flex items-center gap-2">PNGTuber Engine</h1>
                <p class="text-[10px] text-gray-500">v0.7.1 - Audio Fix</p>
            </div>
            <button id="hide-panel-btn" class="text-gray-500 hover:text-white transition">CLOSE</button>
        </header>
        
        <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg">マイクを開始</button>

        <section class="space-y-2">
            <h2 class="text-xs font-semibold text-gray-400">画像セット切り替え (Key: 1, 2)</h2>
            <div class="flex gap-2 p-1 bg-black/20 rounded-xl">
                <button id="set1Btn" class="set-tab active">SET 1</button>
                <button id="set2Btn" class="set-tab inactive">SET 2</button>
            </div>
        </section>

        <section class="space-y-4 border-t border-gray-800 pt-4">
            <div class="flex justify-between items-end"><h2 class="text-sm font-semibold text-gray-300">オーディオ設定</h2><span id="volDisplay" class="text-[10px] font-mono text-gray-500">0</span></div>
            <div class="mic-meter-container">
                <div id="mic-meter-fill"></div>
                <div id="threshold-marker" class="threshold-line"></div>
            </div>
            <div class="space-y-3">
                <div><label class="text-[10px] text-gray-400 flex justify-between">感度 <span id="sensVal">1.5</span></label>
                <input type="range" id="sensitivity" min="0.1" max="5" step="0.1" value="1.5" class="w-full"></div>
                <div><label class="text-[10px] text-gray-400 flex justify-between">しきい値 <span id="threshVal">10</span></label>
                <input type="range" id="threshold" min="0" max="100" step="1" value="10" class="w-full"></div>
            </div>
        </section>

        <section class="space-y-3 border-t border-gray-800 pt-4">
            <h2 class="text-sm font-semibold text-gray-300">画像設定 (<span id="activeSetLabel" class="text-blue-400">Set 1</span>)</h2>
            <div class="grid grid-cols-2 gap-2">
                <label id="labelIdle" class="file-input-label"><span>Idle</span><input type="file" id="imgIdle" accept="image/*" class="hidden"></label>
                <label id="labelBlink" class="file-input-label"><span>Blink</span><input type="file" id="imgBlink" accept="image/*" class="hidden"></label>
                <label id="labelTalk" class="file-input-label"><span>Talk</span><input type="file" id="imgTalk" accept="image/*" class="hidden"></label>
                <label id="labelTalkBlink" class="file-input-label"><span>T-Blink</span><input type="file" id="imgTalkBlink" accept="image/*" class="hidden"></label>
            </div>
            <button id="clearAllImages" class="w-full text-[10px] text-red-500 hover:text-red-400 transition">全画像をストレージから削除</button>
        </section>

        <section class="space-y-4 border-t border-gray-800 pt-4 text-[10px]">
            <h2 class="text-sm font-semibold text-gray-300">表示設定</h2>
            <div class="flex gap-2">
                <button class="bg-gray-700 px-2 py-1 rounded" onclick="setBg('transparent')">格子</button>
                <button class="bg-green-600 px-2 py-1 rounded text-white" onclick="setBg('#00ff00')">緑</button>
                <input type="color" id="bgColorPicker" class="bg-transparent w-8 h-6">
            </div>
            <div><label class="text-gray-400 flex justify-between">ジャンプ強度 <span id="jumpVal">1.0</span></label>
            <input type="range" id="jumpStrength" min="0" max="3" step="0.1" value="1.0" class="w-full"></div>
        </section>

        <footer class="mt-auto pt-4 text-center border-t border-gray-800 space-y-2">
            <button id="saveSettings" class="text-xs text-blue-400 hover:underline">設定を保存</button>
        </footer>
    </div>

    <script>
        // --- IndexedDB Logic ---
        const DB_NAME = 'PNGTuberDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'images';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveImage(key, blob) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).put(blob, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getImage(key) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const request = tx.objectStore(STORE_NAME).get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function clearAllData() {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).clear();
            return new Promise(r => tx.oncomplete = r);
        }

        // --- App Logic ---
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const previewContainer = document.getElementById('preview-container');
        const sidebar = document.getElementById('sidebar');
        
        const elements = {
            startBtn: document.getElementById('startBtn'),
            volDisplay: document.getElementById('volDisplay'),
            sensitivityInput: document.getElementById('sensitivity'),
            thresholdInput: document.getElementById('threshold'),
            jumpStrengthInput: document.getElementById('jumpStrength'),
            micMeter: document.getElementById('mic-meter-fill'),
            threshMarker: document.getElementById('threshold-marker'),
            bgColorPicker: document.getElementById('bgColorPicker'),
            saveBtn: document.getElementById('saveSettings'),
            clearBtn: document.getElementById('clearAllImages'),
            uiToggleBtn: document.getElementById('ui-toggle-btn'),
            hidePanelBtn: document.getElementById('hide-panel-btn'),
            set1Btn: document.getElementById('set1Btn'),
            set2Btn: document.getElementById('set2Btn')
        };
        
        canvas.width = 1000; canvas.height = 1000;

        let audioContext, analyser, dataArray;
        let isRunning = false, isUIVisible = true;
        let currentSetId = 1;
        let isTalking = false, isBlinking = false, blinkTimer = 0;
        let smoothVolume = 0, jumpY = 0;
        let charX = 500, charY = 700, isDragging = false;

        const imageSets = { 1: {}, 2: {} };

        // ドラッグ移動
        previewContainer.addEventListener('mousedown', (e) => { isDragging = true; });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                charX = (e.clientX - rect.left) * scaleX;
                charY = (e.clientY - rect.top) * scaleY;
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // セット管理
        function switchSet(id) {
            currentSetId = id;
            elements.set1Btn.className = `set-tab ${id === 1 ? 'active' : 'inactive'}`;
            elements.set2Btn.className = `set-tab ${id === 2 ? 'active' : 'inactive'}`;
            document.getElementById('activeSetLabel').innerText = `Set ${id}`;
            updateSlotUI();
        }
        elements.set1Btn.addEventListener('click', () => switchSet(1));
        elements.set2Btn.addEventListener('click', () => switchSet(2));

        function updateSlotUI() {
            ['Idle', 'Blink', 'Talk', 'TalkBlink'].forEach(k => {
                const el = document.getElementById('label' + k);
                if (el) {
                    imageSets[currentSetId][k.toLowerCase()] ? el.classList.add('has-image') : el.classList.remove('has-image');
                }
            });
        }

        function toggleUI() {
            isUIVisible = !isUIVisible;
            sidebar.classList.toggle('hidden-panel', !isUIVisible);
            elements.uiToggleBtn.style.opacity = isUIVisible ? '0.3' : '1';
        }
        elements.uiToggleBtn.addEventListener('click', toggleUI);
        elements.hidePanelBtn.addEventListener('click', toggleUI);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'h' || e.key === 'Escape') toggleUI();
            if (key === '1') switchSet(1);
            if (key === '2') switchSet(2);
        });

        // --- 音声処理の修正 ---
        async function initAudio() {
            // すでにコンテキストがある場合はレジュームを試みる
            if (audioContext) {
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                return;
            }

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // ブラウザの制約により、ここでもresumeが必要な場合がある
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                
                analyser = audioContext.createAnalyser(); 
                analyser.fftSize = 256;
                source.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isRunning = true; 
                
                elements.startBtn.innerText = "ON AIR";
                elements.startBtn.classList.replace('bg-blue-600', 'bg-green-600');
                
                // ループ開始
                animate();
            } catch (err) { 
                console.error("マイクの取得に失敗:", err);
                alert("マイク許可が必要です。ブラウザのアドレスバー横の鍵アイコンからマイクが許可されているか確認してください。"); 
            }
        }

        function updateState() {
            if (!isRunning || !analyser) return;

            analyser.getByteFrequencyData(dataArray);
            let sum = 0; 
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            
            // 0-100の範囲でボリュームを計算
            let rawVol = Math.min(100, (sum / dataArray.length) * 1.5);
            
            // なめらかに数値を動かす
            smoothVolume = smoothVolume * 0.85 + rawVol * 0.15;
            
            // UI更新
            elements.volDisplay.innerText = Math.floor(rawVol);
            elements.micMeter.style.width = rawVol + '%';
            
            const threshold = parseFloat(elements.thresholdInput.value);
            elements.micMeter.style.backgroundColor = rawVol > threshold ? '#10b981' : '#3b82f6';

            // 口パク判定
            isTalking = smoothVolume > threshold;

            if (isTalking) {
                const jumpPower = parseFloat(elements.jumpStrengthInput.value);
                jumpY = Math.sin(Date.now() * 0.02) * (smoothVolume - threshold) * 0.6 * jumpPower;
            } else {
                jumpY *= 0.8;
            }

            blinkTimer--;
            if (blinkTimer <= 0) { isBlinking = !isBlinking; blinkTimer = isBlinking ? 8 : (Math.random() * 250 + 120); }
        }

        // 描画
        function drawCharacter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const currentImages = imageSets[currentSetId];
            let activeImage = isTalking ? (isBlinking ? (currentImages.talkblink || currentImages.talk) : currentImages.talk) : (isBlinking ? currentImages.blink : currentImages.idle);

            let squash = 1 + (jumpY * 0.001); 
            let stretch = 1 - (jumpY * 0.001);

            ctx.save();
            ctx.translate(charX, charY - jumpY);
            ctx.scale(squash, stretch);

            if (activeImage) {
                const scale = 600 / Math.max(activeImage.width, activeImage.height);
                const w = activeImage.width * scale, h = activeImage.height * scale;
                ctx.drawImage(activeImage, -w/2, -h, w, h);
            } else {
                drawSDOtaku1(0, 0, isTalking, isBlinking);
            }
            ctx.restore();
        }

        function drawSDOtaku1(x, y, talk, blink) {
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 5; ctx.strokeStyle = '#000';
            ctx.fillStyle = '#000'; ctx.fillRect(x - 50, y - 40, 100, 40); 
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.rect(x - 55, y - 100, 110, 60); ctx.fill(); ctx.stroke(); 
            ctx.beginPath(); ctx.arc(x, y - 200, 100, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); 
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x, y - 205, 103, Math.PI, 0); ctx.lineTo(x + 103, y - 180); ctx.lineTo(x - 103, y - 180); ctx.fill(); 
            if (blink) { ctx.beginPath(); ctx.moveTo(x - 45, y - 210); ctx.lineTo(x - 15, y - 210); ctx.moveTo(x + 15, y - 210); ctx.lineTo(x + 45, y - 210); ctx.stroke(); } 
            else { ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x - 30, y - 220, 8, 0, Math.PI * 2); ctx.arc(x + 30, y - 220, 8, 0, Math.PI * 2); ctx.fill(); }
            if (talk) { ctx.beginPath(); ctx.moveTo(x - 30, y - 180); ctx.quadraticCurveTo(x, y - 120, x + 30, y - 180); ctx.closePath(); ctx.stroke(); } 
            else { ctx.beginPath(); ctx.moveTo(x - 15, y - 170); ctx.lineTo(x + 15, y - 170); ctx.stroke(); }
        }

        // 画像保存・読み込み
        async function loadAllImages() {
            for (let setIdx = 1; setIdx <= 2; setIdx++) {
                for (const key of ['idle', 'blink', 'talk', 'talkblink']) {
                    const blob = await getImage(`set${setIdx}_${key}`);
                    if (blob) {
                        const img = new Image();
                        img.src = URL.createObjectURL(blob);
                        await new Promise(r => img.onload = r);
                        imageSets[setIdx][key] = img;
                    }
                }
            }
            updateSlotUI();
        }

        ['Idle', 'Blink', 'Talk', 'TalkBlink'].forEach(k => {
            const input = document.getElementById('img' + k);
            input.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    await saveImage(`set${currentSetId}_${k.toLowerCase()}`, file);
                    const img = new Image();
                    img.src = URL.createObjectURL(file);
                    img.onload = () => { imageSets[currentSetId][k.toLowerCase()] = img; updateSlotUI(); };
                }
            });
        });

        elements.clearBtn.addEventListener('click', async () => {
            if (confirm("ブラウザに保存されているすべての画像を削除しますか？")) {
                await clearAllData();
                location.reload();
            }
        });

        // 初期化
        window.setBg = (c) => previewContainer.style.background = (c === 'transparent') ? '' : c;
        elements.bgColorPicker.addEventListener('input', (e) => setBg(e.target.value));
        
        // マイク開始ボタンのイベント
        elements.startBtn.addEventListener('click', initAudio);

        window.onload = async () => {
            await loadAllImages();
            const saved = localStorage.getItem('pngtuber_v7_settings');
            if(saved) {
                try {
                    const s = JSON.parse(saved);
                    elements.sensitivityInput.value = s.sens || 1.5;
                    elements.thresholdInput.value = s.thresh || 10;
                    elements.jumpStrengthInput.value = s.jump || 1.0;
                    if(s.bg) setBg(s.bg);
                } catch(e) {}
            }

            const labelMap = { 'sensitivity': 'sensVal', 'threshold': 'threshVal', 'jumpStrength': 'jumpVal' };
            Object.keys(labelMap).forEach(key => {
                const input = document.getElementById(key);
                const label = document.getElementById(labelMap[key]);
                if (input && label) {
                    label.innerText = input.value;
                    if(key === 'threshold') elements.threshMarker.style.left = input.value + '%';
                    input.addEventListener('input', () => {
                        label.innerText = input.value;
                        if(key === 'threshold') elements.threshMarker.style.left = input.value + '%';
                    });
                }
            });
        };

        elements.saveBtn.addEventListener('click', () => {
            localStorage.setItem('pngtuber_v7_settings', JSON.stringify({
                sens: elements.sensitivityInput.value, thresh: elements.thresholdInput.value,
                jump: elements.jumpStrengthInput.value, bg: previewContainer.style.background
            }));
            alert("設定を保存しました");
        });

        function animate() { updateState(); drawCharacter(); requestAnimationFrame(animate); }
    </script>
</body>
</html>
